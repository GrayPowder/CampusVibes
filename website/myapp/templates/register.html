{% load static %} 
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register | CampusVibes</title>
        <link rel="stylesheet" href="{% static 'css/register.css' %}">
        <link rel="icon" type="image/png" href="{% static 'images/logo/cmu.png' %}">
    </head>

    <body>

        <div class="page-wrapper">
            <div class="glass-container">
                <h2>Register</h2>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit">Register</button>
                </form>

                {% if form.errors %}
                    <div class="error-box">
                        {{ form.errors }}
                    </div>
                {% endif %}

                <p class="login-link">
                    Already have an account? <a href="{% url 'login' %}">Login</a>
                </p>
            </div>
        </div>

    </body>
</html>
